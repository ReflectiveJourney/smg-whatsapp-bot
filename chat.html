<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMG Voyages — Test Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:   #075E54;
      --green-mid:    #128C7E;
      --green-light:  #25D366;
      --green-pale:   #dcf8c6;
      --bg-chat:      #efeae2;
      --bg-pattern:   url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23b2bec3' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      --bubble-bot:   #ffffff;
      --bubble-user:  #dcf8c6;
      --text-main:    #111b21;
      --text-muted:   #667781;
      --shadow:       0 1px 2px rgba(0,0,0,.13);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #111b21;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 0;
    }

    /* ── SHELL ── */
    .shell {
      width: 100%;
      max-width: 420px;
      height: 100dvh;
      max-height: 860px;
      display: flex;
      flex-direction: column;
      background: var(--bg-chat);
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0,0,0,.5);
    }

    /* ── HEADER ── */
    .header {
      background: var(--green-dark);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 10;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--green-light), var(--green-mid));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-info { flex: 1; min-width: 0; }
    .header-name {
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: .01em;
    }
    .header-status {
      color: rgba(255,255,255,.75);
      font-size: 12px;
      margin-top: 1px;
    }
    .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--green-light);
      border-radius: 50%;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; }
      50%      { opacity:.4; }
    }

    .header-icons { display: flex; gap: 18px; }
    .header-icons svg { width:20px; height:20px; fill:rgba(255,255,255,.85); cursor:pointer; }

    /* ── DATE BADGE ── */
    .date-badge {
      text-align: center;
      margin: 12px 0 8px;
    }
    .date-badge span {
      background: rgba(255,255,255,.88);
      color: var(--text-muted);
      font-size: 11.5px;
      padding: 4px 10px;
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    /* ── MESSAGES AREA ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px 12px;
      background: var(--bg-chat) var(--bg-pattern);
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,.18); border-radius: 4px; }

    /* ── BUBBLE ── */
    .msg { display: flex; margin-bottom: 4px; }
    .msg.bot  { justify-content: flex-start; }
    .msg.user { justify-content: flex-end; }

    .bubble {
      max-width: 78%;
      padding: 7px 10px 6px 10px;
      border-radius: 7.5px;
      font-size: 14.2px;
      line-height: 1.45;
      color: var(--text-main);
      box-shadow: var(--shadow);
      position: relative;
      word-break: break-word;
      animation: pop .18s ease-out;
    }
    @keyframes pop {
      from { transform: scale(.94); opacity:0; }
      to   { transform: scale(1);   opacity:1; }
    }

    .msg.bot  .bubble { background: var(--bubble-bot); border-top-left-radius: 2px; }
    .msg.user .bubble { background: var(--bubble-user); border-top-right-radius: 2px; }

    /* tail */
    .msg.bot .bubble::before {
      content:'';
      position:absolute;
      left:-7px; top:0;
      border-width:0 8px 8px 0;
      border-style:solid;
      border-color:transparent var(--bubble-bot) transparent transparent;
    }
    .msg.user .bubble::after {
      content:'';
      position:absolute;
      right:-7px; top:0;
      border-width:0 0 8px 8px;
      border-style:solid;
      border-color:transparent transparent transparent var(--bubble-user);
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 3px;
      margin-top: 3px;
    }
    .time { font-size: 10.5px; color: var(--text-muted); }
    .tick { font-size: 12px; color: #53bdeb; }

    /* formatting */
    .bubble strong { font-weight: 600; }
    .bubble em { font-style: italic; }

    /* ── TYPING ── */
    .typing-bubble {
      background: var(--bubble-bot);
      border-radius: 7.5px;
      border-top-left-radius: 2px;
      padding: 12px 14px;
      display: inline-flex;
      gap: 5px;
      box-shadow: var(--shadow);
    }
    .typing-bubble::before {
      content:'';
      position:absolute;
      left:-7px; top:0;
      border-width:0 8px 8px 0;
      border-style:solid;
      border-color:transparent #fff transparent transparent;
    }
    .dot {
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce .9s infinite;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-5px); }
    }

    /* ── INPUT BAR ── */
    .input-bar {
      background: #f0f2f5;
      padding: 8px 12px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
      border-top: 1px solid rgba(0,0,0,.06);
    }

    .input-wrap {
      flex: 1;
      background: #fff;
      border-radius: 24px;
      display: flex;
      align-items: flex-end;
      padding: 9px 14px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      min-height: 44px;
    }

    #msg-input {
      flex: 1;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 15px;
      line-height: 1.4;
      color: var(--text-main);
      resize: none;
      max-height: 120px;
      background: transparent;
    }
    #msg-input::placeholder { color: #aaa; }

    .send-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--green-mid);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
      box-shadow: 0 2px 6px rgba(18,140,126,.4);
    }
    .send-btn:hover  { background: var(--green-dark); }
    .send-btn:active { transform: scale(.92); }
    .send-btn svg { width:22px; height:22px; fill:#fff; }

    /* ── QUICK SUGGESTIONS ── */
    .suggestions {
      display: flex;
      gap: 6px;
      padding: 6px 12px 2px;
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
    }
    .suggestions::-webkit-scrollbar { display: none; }
    .chip {
      background: #fff;
      border: 1.5px solid var(--green-mid);
      color: var(--green-mid);
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 12.5px;
      white-space: nowrap;
      cursor: pointer;
      font-weight: 500;
      transition: all .15s;
      flex-shrink: 0;
    }
    .chip:hover { background: var(--green-mid); color: #fff; }

    /* ── RESPONSIVE ── */
    @media (min-width: 480px) {
      .shell {
        border-radius: 16px;
        height: 90vh;
      }
    }
  </style>
</head>
<body>

<div class="shell">

  <!-- HEADER -->
  <div class="header">
    <div class="avatar">🌍</div>
    <div class="header-info">
      <div class="header-name">SMG Voyages ✈️</div>
      <div class="header-status">
        <span class="status-dot"></span>Assistant virtuel • En ligne
      </div>
    </div>
    <div class="header-icons">
      <svg viewBox="0 0 24 24"><path d="M15.9 14.3H15l-.3-.3c1-1.1 1.6-2.7 1.6-4.3C16.3 5.8 13.5 3 10 3S3.7 5.8 3.7 9.7s2.8 6.7 6.3 6.7c1.6 0 3-.6 4.1-1.6l.3.3v.8l5.1 5.1 1.5-1.5-5.1-5.2zm-5.9 0C7.2 14.3 4.8 11.8 4.8 8.8s2.4-5.5 5.2-5.5 5.2 2.5 5.2 5.5-2.4 5.5-5.2 5.5z"/></svg>
      <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
    </div>
  </div>

  <!-- MESSAGES -->
  <div class="messages" id="messages">
    <div class="date-badge"><span>Aujourd'hui</span></div>
  </div>

  <!-- QUICK CHIPS -->
  <div class="suggestions" id="suggestions">
    <div class="chip" onclick="sendChip('Bonjour')">👋 Bonjour</div>
    <div class="chip" onclick="sendChip('Voir les destinations')">🗺️ Destinations</div>
    <div class="chip" onclick="sendChip('Prix Cap-Vert')">💰 Prix</div>
    <div class="chip" onclick="sendChip('Visa Paris')">🛂 Visa</div>
    <div class="chip" onclick="sendChip('Je veux réserver')">📝 Réserver</div>
    <div class="chip" onclick="sendChip('Parler à un conseiller')">🤝 Conseiller</div>
  </div>

  <!-- INPUT BAR -->
  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="msg-input" placeholder="Écrivez un message…" rows="1"></textarea>
    </div>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('msg-input');
  const userId     = 'test_' + Math.random().toString(36).slice(2, 8);
  let   isWaiting  = false;

  // ── Auto-resize textarea ──
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── Format WhatsApp markdown ──
  function formatWA(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*([^*\n]+)\*/g, '<strong>$1</strong>')
      .replace(/_([^_\n]+)_/g,   '<em>$1</em>')
      .replace(/\n/g, '<br>');
  }

  // ── Current time ──
  function now() {
    return new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
  }

  // ── Add a bubble ──
  function addBubble(text, role) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const tick = role === 'user' ? '<span class="tick">✓✓</span>' : '';
    div.innerHTML = `
      <div class="bubble">
        ${formatWA(text)}
        <div class="meta">
          <span class="time">${now()}</span>${tick}
        </div>
      </div>`;
    messagesEl.appendChild(div);
    scrollBottom();
    return div;
  }

  // ── Typing indicator ──
  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typing';
    div.innerHTML = `
      <div class="bubble" style="padding:0;background:transparent;box-shadow:none;">
        <div class="typing-bubble" style="position:relative;">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
      </div>`;
    messagesEl.appendChild(div);
    scrollBottom();
  }
  function hideTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Send ──
  async function sendMessage() {
    if (isWaiting) return;
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    addBubble(text, 'user');
    isWaiting = true;
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, userId })
      });
      const data = await res.json();
      hideTyping();
      addBubble(data.reponse || data.error || 'Erreur de réponse', 'bot');
    } catch (err) {
      hideTyping();
      addBubble('❌ Impossible de contacter le serveur. Vérifiez que `node index.js` tourne.', 'bot');
    } finally {
      isWaiting = false;
      inputEl.focus();
    }
  }

  function sendChip(text) {
    inputEl.value = text;
    sendMessage();
  }

  // ── Message de bienvenue au chargement ──
  window.addEventListener('load', () => {
    setTimeout(() => {
      showTyping();
      setTimeout(() => {
        hideTyping();
        addBubble(
          `*Bienvenue chez Sous Mon Gîte (SMG) !* ✈️🌍\n\n` +
          `_Votre agence de voyage à Abidjan depuis 2017_\n` +
          `_"Faire découvrir le monde aux Ivoiriens !"_\n\n` +
          `Je suis votre assistant virtuel. Tapez un *chiffre* ou écrivez votre demande :\n\n` +
          `1️⃣ *Destinations* — Découvrir où voyager\n` +
          `2️⃣ *Prix* — Connaître nos tarifs\n` +
          `3️⃣ *Réserver* — Démarrer une réservation\n` +
          `4️⃣ *Suivi dossier* — Suivre votre réservation\n` +
          `5️⃣ *FAQ* — Visa, bagages, assurance\n` +
          `0️⃣ *Conseiller* — Parler à un humain\n\n` +
          `Que puis-je faire pour vous ? 😊`,
          'bot'
        );
        inputEl.focus();
      }, 1200);
    }, 500);
  });
</script>
</body>
</html>
