<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SMG Voyages — Bot WhatsApp</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g-dark:#075E54;--g-mid:#128C7E;--g-light:#25D366;--g-pale:#dcf8c6;
  --bg:#efeae2;--bbot:#fff;--buser:#dcf8c6;--txt:#111b21;--muted:#667781;
  --sh:0 1px 2px rgba(0,0,0,.13);
}
body{font-family:'Inter',system-ui,sans-serif;background:#0a1929;display:flex;
  justify-content:center;align-items:center;min-height:100vh;padding:8px}

.shell{width:100%;max-width:430px;height:100dvh;max-height:860px;
  display:flex;flex-direction:column;background:var(--bg);
  overflow:hidden;box-shadow:0 20px 80px rgba(0,0,0,.7);border-radius:4px}

/* HEADER */
.hdr{background:var(--g-dark);padding:10px 16px;display:flex;
  align-items:center;gap:12px;flex-shrink:0;
  background:linear-gradient(135deg,#075E54,#0a8a7a)}
.av{width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--g-light),var(--g-mid));
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.hi{flex:1;min-width:0}
.hn{color:#fff;font-size:16px;font-weight:600;letter-spacing:.01em}
.hs{color:rgba(255,255,255,.78);font-size:12px;margin-top:1px;display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;background:var(--g-light);border-radius:50%;
  animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:8px 12px 12px;
  background:var(--bg) url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23b2bec3' fill-opacity='0.07'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
  scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:rgba(0,0,0,.18);border-radius:4px}

.datelabel{text-align:center;margin:12px 0 6px}
.datelabel span{background:rgba(255,255,255,.88);color:var(--muted);
  font-size:11.5px;padding:4px 10px;border-radius:8px;box-shadow:var(--sh)}

.row{display:flex;margin-bottom:3px}
.row.bot{justify-content:flex-start}
.row.user{justify-content:flex-end}

.bub{max-width:80%;padding:7px 10px 5px;border-radius:7.5px;
  font-size:14px;line-height:1.48;color:var(--txt);box-shadow:var(--sh);
  position:relative;word-break:break-word;animation:pop .16s ease-out}
@keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.row.bot .bub{background:var(--bbot);border-top-left-radius:2px}
.row.user .bub{background:var(--buser);border-top-right-radius:2px}
.row.bot .bub::before{content:'';position:absolute;left:-7px;top:0;
  border-width:0 8px 8px 0;border-style:solid;border-color:transparent #fff transparent transparent}
.row.user .bub::after{content:'';position:absolute;right:-7px;top:0;
  border-width:0 0 8px 8px;border-style:solid;border-color:transparent transparent transparent var(--g-pale)}
.meta{display:flex;align-items:center;justify-content:flex-end;gap:3px;margin-top:3px}
.ts{font-size:10.5px;color:var(--muted)}
.ck{font-size:12px;color:#53bdeb}
.bub strong{font-weight:600}
.bub em{font-style:italic}
.bub a{color:var(--g-mid);text-decoration:none}

/* TYPING */
.typing-row{display:flex;margin-bottom:4px}
.typing-bub{background:#fff;border-radius:7.5px;border-top-left-radius:2px;
  padding:11px 13px;display:inline-flex;gap:5px;box-shadow:var(--sh);position:relative}
.typing-bub::before{content:'';position:absolute;left:-7px;top:0;
  border-width:0 8px 8px 0;border-style:solid;border-color:transparent #fff transparent transparent}
.d{width:7px;height:7px;background:var(--muted);border-radius:50%;animation:bk .9s infinite}
.d:nth-child(2){animation-delay:.15s}.d:nth-child(3){animation-delay:.3s}
@keyframes bk{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* CHIPS */
.chips{display:flex;gap:6px;padding:6px 12px 2px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{background:#fff;border:1.5px solid var(--g-mid);color:var(--g-mid);
  border-radius:20px;padding:5px 13px;font-size:12px;white-space:nowrap;
  cursor:pointer;font-weight:500;transition:all .15s;flex-shrink:0;font-family:inherit}
.chip:hover{background:var(--g-mid);color:#fff}

/* INPUT */
.bar{background:#f0f2f5;padding:8px 12px;display:flex;align-items:flex-end;
  gap:8px;flex-shrink:0;border-top:1px solid rgba(0,0,0,.07)}
.wrap{flex:1;background:#fff;border-radius:24px;display:flex;align-items:flex-end;
  padding:9px 14px;box-shadow:0 1px 3px rgba(0,0,0,.09);min-height:44px}
#inp{flex:1;border:none;outline:none;font-family:inherit;font-size:15px;
  line-height:1.4;color:var(--txt);resize:none;max-height:120px;background:transparent}
#inp::placeholder{color:#aaa}
.sbtn{width:48px;height:48px;border-radius:50%;background:var(--g-mid);border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background .15s,transform .1s;box-shadow:0 2px 6px rgba(18,140,126,.4)}
.sbtn:hover{background:var(--g-dark)}.sbtn:active{transform:scale(.92)}
.sbtn svg{width:22px;height:22px;fill:#fff}

@media(min-width:480px){.shell{border-radius:12px;height:90vh}}
</style>
</head>
<body>

  <div class="hdr">

    </div>
  </div>

  <div class="msgs" id="msgs">
    <div class="datelabel"><span id="today"></span></div>
  </div>

  <div class="chips">
    <button class="chip" onclick="chip('Bonjour')">👋 Bonjour</button>
    <button class="chip" onclick="chip('Voir les destinations')">🗺️ Destinations</button>
    <button class="chip" onclick="chip('Prix Cap-Vert')">💰 Prix</button>
    <button class="chip" onclick="chip('Visa Paris')">🛂 Visa</button>
    <button class="chip" onclick="chip('Je veux réserver')">📝 Réserver</button>
    <button class="chip" onclick="chip('Météo Dubai')">🌤️ Météo</button>
    <button class="chip" onclick="chip('Parler à un conseiller')">🤝 Conseiller</button>
  </div>

  <div class="bar">
    <div class="wrap"><textarea id="inp" placeholder="Écrivez un message…" rows="1"></textarea></div>
    <button class="sbtn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

const contextes = {};
const incomprehensions = {};

function getCtx(uid){
  if(!contextes[uid]) contextes[uid]={derniereDestination:null,derniereAction:null,historique:[],donneesCollectees:{},reservationEtape:null};
  return contextes[uid];
}

function detecterIntention(message){
  const m=message.toLowerCase().trim();
  if(/^[0-6]$/.test(m)){
    const map={1:'destinations',2:'prix',3:'reservation',4:'suivi',5:'faq_menu',6:'escalade_directe',0:'escalade_directe'};
    return map[m];
  }
  if(/^(menu|aide|help|accueil|retour)$/i.test(m)) return 'salutation';
  if(/^(bonjour|salut|bonsoir|hello|hi|hey|coucou|yo|bjr|slt)/i.test(m)) return 'salutation';
  if(m.includes('disponib')||m.includes('prochaine date')||m.includes('prochain depart')||m.includes('prochain départ')||m.includes('date de départ')||m.includes('date de depart')) return 'disponibilite';
  if(m.includes('destination')||m.includes('voyage')||m.includes('voyager')||m.includes('ou aller')||m.includes('où aller')||m.includes('proposez')||m.includes('liste')) return 'destinations';
  if(m.includes('prix')||m.includes('tarif')||m.includes('coût')||m.includes('cout')||m.includes('combien')||m.includes('fcfa')||m.includes('budget')||m.includes('promotion')) return 'prix';
  if(m.includes('réserv')||m.includes('reserv')||m.includes('book')||m.includes('je veux partir')||m.includes('je voudrais partir')||m.includes('j\'aimerais')||m.includes('je veux aller')||m.includes('payer')||m.includes('paiement')) return 'reservation';
  if(m.includes('dossier')||m.includes('suivi')||m.includes('statut')||m.includes('confirmation')) return 'suivi';
  if(m.includes('visa')||m.includes('passeport')||m.includes('document')||m.includes('papier')||m.includes('ambassade')) return 'faq_visa';
  if(m.includes('bagage')||m.includes('valise')||m.includes('kilo')) return 'faq_bagages';
  if(m.includes('assurance')||m.includes('couverture')||m.includes('médical')||m.includes('medical')) return 'faq_assurance';
  if(m.includes('annul')||m.includes('rembours')||m.includes('modifier')||m.includes('changer')) return 'faq_annulation';
  if(m.includes('orange money')||m.includes('mtn')||m.includes('moov')||m.includes('wave')||m.includes('mobile money')||m.includes('comment payer')) return 'faq_paiement';
  if(/^faq$/i.test(m)) return 'faq_menu';
  if(m.includes('météo')||m.includes('meteo')||m.includes('climat')||m.includes('température')||m.includes('chaud')||m.includes('froid')||m.includes('pluie')||m.includes('meilleure période')) return 'info_meteo';
  if(m.includes('monnaie')||m.includes('devise')||m.includes('taux')||m.includes('dollar')||m.includes('argent sur place')||m.includes('carte bancaire')) return 'info_monnaie';
  if(m.includes('décalage')||m.includes('decalage')||m.includes('fuseau')||m.includes('quelle heure')) return 'info_horaire';
  if(m.includes('langue')||m.includes('parle')||m.includes('anglais')||m.includes('communiquer')) return 'info_langue';
  if(m.includes('vaccin')||m.includes('santé')||m.includes('sante')||m.includes('médecin')||m.includes('maladie')||m.includes('paludisme')) return 'info_sante';
  if(m.includes('sécurité')||m.includes('securite')||m.includes('danger')||m.includes('sûr')||m.includes('risque')||m.includes('arnaque')) return 'info_securite';
  if(m.includes('culture')||m.includes('coutume')||m.includes('religion')||m.includes('pourboire')||m.includes('ramadan')) return 'info_culture';
  if(m.includes('manger')||m.includes('nourriture')||m.includes('restaurant')||m.includes('cuisine')||m.includes('halal')||m.includes('repas')) return 'info_nourriture';
  if(m.includes('transport')||m.includes('métro')||m.includes('taxi')||m.includes('uber')||m.includes('se déplacer')) return 'info_transport';
  if(m.includes('emporter')||m.includes('préparer')||m.includes('valise')||m.includes('check-list')) return 'info_emporter';
  if(m.includes('compagnie')||m.includes('avion')||m.includes('vol')||m.includes('airline')||m.includes('escale')||m.includes('durée')) return 'info_compagnies';
  if(m.includes('voir')||m.includes('visiter')||m.includes('activité')||m.includes('activite')||m.includes('monument')||m.includes('incontournable')) return 'info_activites';
  if(m.includes('internet')||m.includes('wifi')||m.includes('sim')||m.includes('réseau')) return 'info_internet';
  if(m.includes('urgence')||m.includes('police')||m.includes('ambulance')||m.includes('secours')||m.includes('sos')) return 'info_urgences';
  if(m.includes('prise')||m.includes('électricité')||m.includes('adaptateur')||m.includes('chargeur')) return 'info_electricite';
  if(m.includes('humain')||m.includes('agent')||m.includes('conseiller')||m.includes('parler à')) return 'escalade_directe';
  if(/^(merci|thanks|thank you|super|parfait|ok merci)/i.test(m)) return 'remerciement';
  if(/^(et |et pour |et le |et la |c'est )/.test(m)) return 'reference_implicite';
  return 'question_generale';
}

  const m=message.toLowerCase();
  const dests=[
    {id:'cap_vert',mots:['cap-vert','cap vert','capvert','praia','tarrafal','cidade velha','santiago']},
    {id:'dakar',mots:['dakar','sénégal','senegal','saly','lac rose','goree','gorée']},

    {id:'dubai',mots:['dubai','dubaï','emirat','émirat']},

function fmtDate(s){
  const mois=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  const p=s.split('-');
  return `${parseInt(p[2])} ${mois[parseInt(p[1])-1]} ${p[0]}`;
}

function listeDestinations(){
  let r=`*✈️ Nos destinations au départ d'Abidjan :*\n\n`;

    r+=`${ph}*${d.nom}*\n${d.duree} — à partir de *${d.prix_fcfa.toLocaleString('fr-FR')} FCFA* (${d.prix_euro}€)\n${d.disponibilite?'✅ Disponible':'❌ Complet'}\n\n`;

  let r=`*💰 Tarifs SMG (par personne, tout compris) :*\n\n`;
  const tri=[...VOYAGES.destinations].sort((a,b)=>a.prix_fcfa-b.prix_fcfa);
  for(const d of tri) r+=`*${d.nom}*\n${d.duree} — *${d.prix_fcfa.toLocaleString('fr-FR')} FCFA* (${d.prix_euro}€)\n\n`;
  r+=`Ces prix incluent : vol A/R, hôtel, transferts, petit-déjeuner et assurance.\n\nTapez le nom d'une destination pour plus de détails !`;
  return r;
}

function prixDestination(id){
  const d=VOYAGES.destinations.find(x=>x.id===id);
  if(!d) return `Je n'ai pas trouvé cette destination. Tapez *1* pour voir toutes nos destinations.`;
  let r=`*💰 ${d.nom} — Détail du tarif*\n\n*Prix :* ${d.prix_fcfa.toLocaleString('fr-FR')} FCFA (${d.prix_euro}€) par personne\n*Durée :* ${d.duree}\n\n*✅ Inclus :*\n`;
  for(const i of d.inclus) r+=`- ${i}\n`;
  r+=`\n*❌ Non inclus :*\n`;
  for(const i of d.non_inclus) r+=`- ${i}\n`;
  r+=`\n*📅 Prochains départs :*\n`;
  for(const dt of d.prochains_departs) r+=`- ${fmtDate(dt)}\n`;
  r+=`\nPour réserver, tapez *3* ou *"Réserver ${d.nom.split(',')[0]}"* !`;
  return r;
}

function disponibiliteDestination(id){
  const d=VOYAGES.destinations.find(x=>x.id===id);
  if(!d) return `Je n'ai pas trouvé cette destination. Tapez *1* pour voir nos destinations.`;
  let r=`*📅 Disponibilité — ${d.nom}*\n\n`;
  if(!d.disponibilite){r+=`❌ Désolé, cette destination est *complète* pour le moment.\n\nContactez un conseiller SMG pour être mis sur liste d'attente. Tapez *0*.`;return r;}
  r+=`✅ *Disponible !*\n\n*Prochains départs :*\n`;
  for(const dt of d.prochains_departs) r+=`- ${fmtDate(dt)}\n`;
  r+=`\n*Prix :* ${d.prix_fcfa.toLocaleString('fr-FR')} FCFA (${d.prix_euro}€) par personne\n*Durée :* ${d.duree}\n\n`;
  r+=`⚠️ Prévoyez au minimum *2 semaines* pour l'organisation (billets, hôtel${d.visa.requis?', visa':''}).\n\nPour réserver, tapez *3* !`;
  return r;
}

function disponibiliteGenerale(){
  let r=`*📅 Disponibilités — Toutes nos destinations :*\n\n`;
  for(const d of VOYAGES.destinations){
    r+=d.disponibilite?`✅ *${d.nom}*\nProchain départ : ${fmtDate(d.prochains_departs[0])} — *${d.prix_fcfa.toLocaleString('fr-FR')} FCFA*\n\n`:`❌ *${d.nom}* — Complet\n\n`;
  }
  r+=`⚠️ Un départ nécessite au minimum *2 semaines* de préparation.\n\nTapez le nom d'une destination pour plus de détails !`;
  return r;
}

function visaDestination(id){
  const d=VOYAGES.destinations.find(x=>x.id===id);
  if(!d) return visaGeneral();
  const v=d.visa;
  let r=`*🛂 Visa — ${d.nom}*\n\n`;
  if(!v.requis){r+=`*Bonne nouvelle !* Aucun visa n'est requis pour les Ivoiriens. 🎉\n\n*Documents nécessaires :*\n`;}
  else{r+=`*Type :* ${v.type}\n*Délai :* ${v.delai}\n*Coût :* ${v.cout_visa_fcfa.toLocaleString('fr-FR')} FCFA\n*Lieu de dépôt :* ${v.lieu_depot}\n\n*Documents requis :*\n`;}
  for(const dc of v.documents) r+=`- ${dc}\n`;
  r+=`\nSMG vous accompagne dans vos démarches de visa. Tapez *3* ou *"réserver"* pour commencer !`;
  return r;
}

function visaGeneral(){
  let r=`*🛂 Infos visa — Passeport ivoirien :*\n\n`;
  const sans=VOYAGES.destinations.filter(d=>!d.visa.requis);
  if(sans.length){r+=`*✅ Sans visa :*\n`;for(const d of sans)r+=`- ${d.nom}\n`;r+=`\n`;}
  r+=`*📋 Visa requis :*\n`;
  for(const d of VOYAGES.destinations.filter(x=>x.visa.requis)) r+=`- *${d.nom.split(',')[0]}* : ${d.visa.type} (${d.visa.delai}) — ${d.visa.cout_visa_fcfa.toLocaleString('fr-FR')} FCFA\n`;
  r+=`\nPour les détails d'une destination, tapez _"Visa Paris"_ par exemple.\nSMG vous accompagne dans toutes vos démarches ! 💪`;
  return r;
}

function infoDestination(id,type){
  if(!id) return `Pour quelle destination souhaitez-vous cette information ?\n\n${VOYAGES.destinations.map(d=>`- *${d.nom.split(',')[0]}*`).join('\n')}\n\nExemple : _"Météo Dubai"_ ou _"Vaccins Bangkok"_`;
  const info=CONNAISSANCES.destinations[id];
  const dest=VOYAGES.destinations.find(d=>d.id===id);
  const nom=dest?dest.nom:id;
  if(!info) return `Je n'ai pas encore d'informations détaillées sur cette destination. Un conseiller SMG peut vous aider ! Tapez *0*.`;
  switch(type){
    case 'meteo': return `*🌤️ Météo — ${nom}*\n\n*Meilleure période :* ${info.meteo.meilleure_periode}\n*Températures :* ${info.meteo.temperatures}\n\n${info.meteo.detail}`;
    case 'monnaie': return `*💱 Monnaie — ${nom}*\n\n*Devise :* ${info.monnaie.devise}\n*Taux :* ${info.monnaie.taux_fcfa}\n\n💡 ${info.monnaie.conseil}`;
    case 'horaire': return `*🕐 Décalage horaire — ${nom}*\n\n${info.decalage_horaire}\n\nPensez à ajuster votre horloge en arrivant !`;
    case 'langue': return `*🗣️ Langue — ${nom}*\n\n${info.langue}`;
    case 'sante': return `*🏥 Santé & Vaccins — ${nom}*\n\n*Vaccins :* ${info.sante.vaccins}\n\n*Conseils :* ${info.sante.conseils}`;
    case 'securite': return `*🔒 Sécurité — ${nom}*\n\n${info.securite}`;
    case 'culture': return `*🎭 Culture & Coutumes — ${nom}*\n\n${info.culture}`;
    case 'nourriture': return `*🍽️ Nourriture — ${nom}*\n\n*Budget repas :* ${info.nourriture.budget_repas}\n\n*Spécialités locales :* ${info.nourriture.specialites}\n\n*Halal :* ${info.nourriture.halal}`;
    case 'transport': return `*🚕 Transport local — ${nom}*\n\n${info.transport_local}`;
    case 'emporter': return `*🧳 Quoi emporter — ${nom}*\n\n${info.quoi_emporter}`;
    case 'compagnies': return `*✈️ Compagnies aériennes — ${nom}*\n\n*Depuis Abidjan :* ${info.compagnies_aeriennes}`;
    case 'activites': return `*📸 À voir / À faire — ${nom}*\n\n*Incontournables :* ${info.a_voir}`;
    case 'internet': return `*📱 Internet & SIM — ${nom}*\n\n${info.sim_internet}`;
    case 'urgences': return `*🆘 Numéros d'urgence — ${nom}*\n\n${info.urgences}`;
    case 'electricite': return `*🔌 Électricité — ${nom}*\n\n${info.electricite}`;
    default: return `Je n'ai pas cette information. Tapez *0* pour parler à un conseiller.`;
  }
}

function reservation(id){
  const destList=VOYAGES.destinations.map(d=>`- *${d.nom.split(',')[0]}* (${d.prix_fcfa.toLocaleString('fr-FR')} FCFA)`).join('\n');
  if(id){
    const d=VOYAGES.destinations.find(x=>x.id===id);
    if(d) return `*📝 Réservation — ${d.nom}*\n\nSuper choix ! Pour finaliser votre réservation :\n\n1️⃣ *Date de départ* parmi :\n${d.prochains_departs.map(dt=>`   - ${fmtDate(dt)}`).join('\n')}\n\n2️⃣ *Nombre de voyageurs*\n3️⃣ *Votre nom complet*\n4️⃣ *Votre numéro de téléphone*\n\nEnvoyez ces infos et un conseiller SMG vous contactera sous *30 minutes* ! 😊`;
  }
  return `*📝 Réservation SMG*\n\nJe serais ravi de vous aider à réserver ! 😊\n\nPour quelle destination souhaitez-vous réserver ?\n\n${destList}\n\nTapez le nom de la destination !`;
}

function traiterEtapeReservation(msg,ctx){
  const m=msg.toLowerCase().trim();
  if(m==='menu'||m==='annuler'||m==='retour'||m==='0'){ctx.reservationEtape=null;ctx.donneesCollectees={};return salutation();}
  switch(ctx.reservationEtape){
    case 'destination':{
      const id=extraireDestination(msg);
      if(id){ctx.donneesCollectees.destination=id;ctx.derniereDestination=id;ctx.reservationEtape='date';
        const d=VOYAGES.destinations.find(x=>x.id===id);
        return `*📝 Réservation — ${d.nom}*\n\nSuper choix ! 🎉\n\n*Étape 1/4* — Quelle *date de départ* souhaitez-vous ?\n\nDates disponibles :\n${d.prochains_departs.map(dt=>`- ${fmtDate(dt)}`).join('\n')}\n\nTapez la date souhaitée ou *menu* pour annuler.`;}
      return `Je n'ai pas trouvé cette destination. Tapez le nom parmi :\n${VOYAGES.destinations.map(d=>`- *${d.nom.split(',')[0]}*`).join('\n')}\n\nOu tapez *menu* pour annuler.`;
    }
    case 'date': ctx.donneesCollectees.date=msg.trim();ctx.reservationEtape='voyageurs';return `✅ Date notée : *${msg.trim()}*\n\nCombien de *voyageurs* participeront ? (ex: _2_)`;
    case 'voyageurs': ctx.donneesCollectees.voyageurs=msg.trim();ctx.reservationEtape='nom';return `✅ *${msg.trim()} voyageur(s)* noté(s).\n\nQuel est votre *nom complet* ? (ex: _Kouassi Jean-Marc_)`;
    case 'nom': ctx.donneesCollectees.nom=msg.trim();ctx.reservationEtape='telephone';return `✅ Merci *${msg.trim()}* !\n\nQuel est votre *numéro de téléphone* ? (ex: _+225 07 89 03 14_)\n\nSi c'est ce numéro, tapez *oui*.`;
    case 'telephone':{
      ctx.donneesCollectees.telephone=(m==='oui'||m==='o')?'Ce numéro WhatsApp':msg.trim();
      ctx.reservationEtape=null;
      const dc=ctx.donneesCollectees;
      const d=VOYAGES.destinations.find(x=>x.id===dc.destination);
      const total=d?d.prix_fcfa*(parseInt(dc.voyageurs)||1):0;
      return `*✅ Récapitulatif de votre réservation :*\n\n*Destination :* ${d?d.nom:dc.destination}\n*Date de départ :* ${dc.date}\n*Nombre de voyageurs :* ${dc.voyageurs}\n*Nom :* ${dc.nom}\n*Téléphone :* ${dc.telephone}\n\n${d?`*Prix par personne :* ${d.prix_fcfa.toLocaleString('fr-FR')} FCFA\n*Prix total :* ${total.toLocaleString('fr-FR')} FCFA\n\n`:''}`+
      `🎉 *Votre demande de réservation est enregistrée !*\n\nUn conseiller SMG vous contactera sous *30 minutes* pour :\n- Confirmer la disponibilité\n- Organiser le paiement\n- Répondre à vos questions\n\n📞 *+225 07 87 198 765*\n📧 *smgvoyages@gmail.com*\n\nMerci de votre confiance ! ✈️😊`;
    }
    default: ctx.reservationEtape=null;return null;
  }
}

function traiterMessage(message,uid){
  const ctx=getCtx(uid);
  if(!incomprehensions[uid]) incomprehensions[uid]=0;
  ctx.historique.push({role:'user',content:message});
  if(ctx.historique.length>20) ctx.historique=ctx.historique.slice(-20);

  if(ctx.reservationEtape){
    const r=traiterEtapeReservation(message,ctx);
    if(r){ctx.historique.push({role:'assistant',content:r});return r;}
  }

  let intention=detecterIntention(message);
  const destMsg=extraireDestination(message);
  let destId=destMsg||(ctx.derniereDestination||null);
  if(destMsg) ctx.derniereDestination=destMsg;

  if(intention==='reference_implicite'){
    const m=message.toLowerCase();
    if(m.includes('combien')||m.includes('prix')||m.includes('tarif')) intention='prix';
    else if(m.includes('visa')||m.includes('document')) intention='faq_visa';
    else if(m.includes('disponib')||m.includes('date')||m.includes('place')) intention='disponibilite';
    else if(m.includes('réserv')||m.includes('reserv')) intention='reservation';
    else intention=ctx.derniereAction||'question_generale';
  }

  let rep;
  incomprehensions[uid]=0;

  switch(intention){
    case 'salutation': rep=salutation();break;
    case 'destinations': ctx.derniereAction='destinations';rep=listeDestinations()+miniMenu();break;
    case 'prix': ctx.derniereAction='prix';rep=(destId?prixDestination(destId):listePrix())+miniMenu();break;
    case 'disponibilite': ctx.derniereAction='disponibilite';rep=(destId?disponibiliteDestination(destId):disponibiliteGenerale())+miniMenu();break;
    case 'reservation':
      ctx.derniereAction='reservation';
      if(destId){ctx.donneesCollectees={destination:destId};ctx.reservationEtape='date';
        const d=VOYAGES.destinations.find(x=>x.id===destId);
        rep=`*📝 Réservation — ${d?d.nom:destId}*\n\nSuper choix ! Commençons la réservation étape par étape.\n\n*Étape 1/4* — Quelle *date de départ* souhaitez-vous ?\n\nDates disponibles :\n${d?d.prochains_departs.map(dt=>`- ${fmtDate(dt)}`).join('\n'):'À confirmer'}\n\nTapez la date souhaitée ou *menu* pour annuler.`;
      }else{ctx.reservationEtape='destination';ctx.donneesCollectees={};rep=reservation(null)+miniMenu();}
      break;
    case 'suivi': ctx.derniereAction='suivi';rep=`*📋 Suivi de votre dossier*\n\nPour consulter l'état de votre réservation, envoyez-moi votre *numéro de dossier*.\n\nFormat : _SMG-XXXXX_\n\nSi vous n'avez pas votre numéro, tapez *0* pour parler à un conseiller.`+miniMenu();break;
    case 'faq_menu': rep=`*❓ FAQ — Questions fréquentes*\n\nChoisissez un sujet :\n\n1️⃣ *Visa* — Infos visa par destination\n2️⃣ *Bagages* — Poids et dimensions autorisés\n3️⃣ *Assurance* — Couverture voyage\n4️⃣ *Annulation* — Conditions de remboursement\n5️⃣ *Paiement* — Modes de paiement acceptés\n\nTapez le sujet ou *menu* pour revenir.`;break;
    case 'faq_visa': ctx.derniereAction='faq_visa';rep=(destId?visaDestination(destId):visaGeneral())+miniMenu();break;
    case 'faq_bagages': rep=VOYAGES.faq.bagages.reponse+miniMenu();break;
    case 'faq_assurance': rep=VOYAGES.faq.assurance.reponse+miniMenu();break;
    case 'faq_annulation': rep=VOYAGES.faq.annulation.reponse+miniMenu();break;
    case 'faq_paiement': rep=VOYAGES.faq.paiement.reponse+miniMenu();break;
    case 'escalade_directe': rep=`*🤝 Transfert vers un conseiller SMG*\n\nUn conseiller vous contactera sous *30 minutes*. 😊\n\n📞 *+225 07 87 198 765*\n📧 *smgvoyages@gmail.com*\n📘 *SMG Agence de Voyage* (Facebook)\n📍 *47, rue Fleming, Zone 4, Abidjan*\n\nTapez *menu* pour revoir les options.`;break;
    case 'remerciement': rep=`Avec plaisir ! 😊\n\nN'hésitez pas à revenir si vous avez d'autres questions. Tapez *menu* à tout moment !\nL'équipe SMG est là pour vous ! ✈️🌍`;break;
    case 'info_meteo': rep=infoDestination(destId,'meteo')+miniMenu();break;
    case 'info_monnaie': rep=infoDestination(destId,'monnaie')+miniMenu();break;
    case 'info_horaire': rep=infoDestination(destId,'horaire')+miniMenu();break;
    case 'info_langue': rep=infoDestination(destId,'langue')+miniMenu();break;
    case 'info_sante': rep=infoDestination(destId,'sante')+miniMenu();break;
    case 'info_securite': rep=infoDestination(destId,'securite')+miniMenu();break;
    case 'info_culture': rep=infoDestination(destId,'culture')+miniMenu();break;
    case 'info_nourriture': rep=infoDestination(destId,'nourriture')+miniMenu();break;
    case 'info_transport': rep=infoDestination(destId,'transport')+miniMenu();break;
    case 'info_emporter': rep=infoDestination(destId,'emporter')+miniMenu();break;
    case 'info_compagnies': rep=infoDestination(destId,'compagnies')+miniMenu();break;
    case 'info_activites': rep=infoDestination(destId,'activites')+miniMenu();break;
    case 'info_internet': rep=infoDestination(destId,'internet')+miniMenu();break;
    case 'info_urgences': rep=infoDestination(destId,'urgences')+miniMenu();break;
    case 'info_electricite': rep=infoDestination(destId,'electricite')+miniMenu();break;
    default:
      incomprehensions[uid]++;
      if(incomprehensions[uid]>=2){
        incomprehensions[uid]=0;
        rep=`Hmm, je ne suis pas sûr de comprendre votre demande. 🤔\n\nJe vous mets en relation avec un conseiller SMG !\n\n📞 *+225 07 87 198 765*\n📧 *smgvoyages@gmail.com*\n\nOu tapez *menu* pour revoir les options.`;
      }else{
        rep=`Je n'ai pas bien compris votre demande. 🤔\n\nVous pouvez taper un *chiffre* du menu ou écrire votre demande librement 😊\n\n1️⃣ Destinations  2️⃣ Prix  3️⃣ Réserver\n4️⃣ Suivi  5️⃣ FAQ  0️⃣ Conseiller\n\nOu tapez *menu*.`;
      }
      break;
  }

  ctx.historique.push({role:'assistant',content:rep});
  return rep;
}

// ============================================================
// UI
// ============================================================
const msgsEl=document.getElementById('msgs');
const inpEl=document.getElementById('inp');
const userId='user_'+Math.random().toString(36).slice(2,8);
let waiting=false;

document.getElementById('today').textContent=new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});

inpEl.addEventListener('input',()=>{inpEl.style.height='auto';inpEl.style.height=Math.min(inpEl.scrollHeight,120)+'px';});
inpEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});

function fmtWA(t){
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*([^*\n]+)\*/g,'<strong>$1</strong>')
    .replace(/_([^_\n]+)_/g,'<em>$1</em>')
    .replace(/---/g,'<hr style="border:none;border-top:1px solid #e0e0e0;margin:6px 0">')
    .replace(/\n/g,'<br>');
}

function nowTime(){return new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}

function addMsg(text,role){
  const d=document.createElement('div');
  d.className='row '+role;
  d.innerHTML=`<div class="bub">${fmtWA(text)}<div class="meta"><span class="ts">${nowTime()}</span>${role==='user'?'<span class="ck">✓✓</span>':''}</div></div>`;
  msgsEl.appendChild(d);
  msgsEl.scrollTop=msgsEl.scrollHeight;
}

function showTyping(){
  const d=document.createElement('div');
  d.className='typing-row';d.id='typing';
  d.innerHTML='<div class="typing-bub"><span class="d"></span><span class="d"></span><span class="d"></span></div>';
  msgsEl.appendChild(d);msgsEl.scrollTop=msgsEl.scrollHeight;
}
function hideTyping(){const t=document.getElementById('typing');if(t)t.remove();}

function send(){
  if(waiting)return;
  const txt=inpEl.value.trim();if(!txt)return;
  inpEl.value='';inpEl.style.height='auto';
  addMsg(txt,'user');
  waiting=true;showTyping();
  const delay=400+Math.random()*600;
  setTimeout(()=>{
    hideTyping();
    const rep=traiterMessage(txt,userId);
    addMsg(rep,'bot');
    waiting=false;
    inpEl.focus();
  },delay);
}

function chip(t){inpEl.value=t;send();}

// Message de bienvenue
setTimeout(()=>{
  showTyping();
  setTimeout(()=>{
    hideTyping();
    addMsg(salutation(),'bot');
    inpEl.focus();
  },900);
},400);
</script>
